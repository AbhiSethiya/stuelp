<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STUELP</title>
  <link href="https://fonts.googleapis.com/css?family=Muli:400,700&display=swap" rel="stylesheet">
  <style>
     * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Muli', sans-serif;
            line-height: 1.6;
            color: white;
            background-color: black;
        }
        .container {
            width: 80%;
            margin: auto;
            overflow: hidden;
            padding: 20px;
        }
        header {
            background: #161616;
            color: white;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            transition: all 0.3s ease;
        }
        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.8em;
            letter-spacing: 0.2em;
            font-weight: 700;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }
        .logo:hover {
            color: grey;
        }
        nav ul {
            display: flex;
            list-style: none;
        }
        nav ul li {
            margin-left: 20px;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-size: 1.1em;
            transition: color 0.3s ease;
        }
        nav ul li a:hover {
            color: grey;
        }
        .main-content {
            margin-top: 80px;
            padding: 2rem 0;
        }
        .hero {
            text-align: center;
            padding: 4rem 0;
        }
        .hero h2 {
            font-size: 2.5em;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s forwards;
        }
        .hero p {
            font-size: 1.2em;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s 0.2s forwards;
        }
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .selection-area {
            background: black;
            padding: 2rem;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s 0.4s forwards;
        }
        .dropdown-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }
        .custom-dropdown {
            position: relative;
            width: 48%;
        }
        .dropdown-btn {
            width: 100%;
            padding: 12px 20px;
            background-color: white;
            color: #161616;
            border: none;
            font-size: 1em;
            font-family: 'Muli', sans-serif;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
        }
        .dropdown-btn:hover, .dropdown-btn:focus {
            background-color: #f0f0f0;
            outline: none;
        }
        .dropdown-btn::after {
            content: '\25BC';
            position: absolute;
            right: 15px;
            top: 60%;
            transform: translateY(-50%);
        }
        .dropdown-content {
            height: 400%;
            display: none;
            position: absolute;
            background-color: white;
            width: 100%;
            box-shadow: 0 8px 16px 0 rgba(0,0,0,0.2);
            z-index: 1;
            max-height: 250px; /* Increased max-height */
            overflow-y: auto;
        }
        .dropdown-content a {
            color: #161616;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: background-color 0.3s ease;
        }
        .dropdown-content a:hover {
            background-color: #f0f0f0;
        }
        .show {
            display: block;
        }
        .resources {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 2rem;
        }
        .resource-button {
            background: white;
            color: black;
            padding: 15px 30px;
            border: none;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            cursor: pointer;
            opacity: 0;
            transform: translateY(20px);
        }
        .resource-button:nth-child(1) {
            animation: fadeInUp 0.5s 0.2s forwards;
        }
        .resource-button:nth-child(2) {
            animation: fadeInUp 0.5s 0.3s forwards;
        }
        .resource-button:hover {
            background: #161616;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.1);
        }
    body {
      font-family: 'Muli', sans-serif;
      background-color: black;
      color: white;
    }
    header, nav, .container, .hero, .resources {
      /* Styles omitted for brevity */
    }
    .resource-button {
      background: white;
      color: black;
      padding: 15px 30px;
      border: none;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="NewIndex.html" class="logo">STUELP</a>
      <nav>
        <ul>
          <li><a href="#home">Home</a></li>
          <li><a href="#resources">Resources</a></li>
          <li><a href="#about">About</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <div class="main-content">
    <div class="container">
      <section id="home" class="hero">
        <h2>Welcome to STUELP</h2>
        <p>Your one-stop solution for academic resources</p>
      </section>
      <section id="resources">
        
        <div class="resources">
          <a href="NewSubjects.html?year=2&branch=cs&resourceType=notes" class="resource-button">NOTES</a>
          <a href="#" class="resource-button">VIDEOS</a>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
