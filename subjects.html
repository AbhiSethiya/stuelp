    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>STUELP - Subjects</title>
        <link href="https://fonts.googleapis.com/css?family=Muli:400,700&display=swap" rel="stylesheet">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: 'Muli', sans-serif;
                line-height: 1.6;
                color: white;
                background-color: black;
            }
            .container {
                width: 80%;
                margin: auto;
                overflow: hidden;
                padding: 20px;
            }
            header {
                background: #161616;
                color: white;
                padding: 1rem 0;
                position: fixed;
                width: 100%;
                top: 0;
                z-index: 1000;
                transition: all 0.3s ease;
            }
            header .container {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .logo {
                font-size: 1.8em;
                letter-spacing: 0.2em;
                font-weight: 700;
                text-decoration: none;
                color: white;
                transition: all 0.3s ease;
            }
            .logo:hover {
                color: black;
            }
            nav ul {
                display: flex;
                list-style: none;
            }
            nav ul li {
                margin-left: 20px;
            }
            nav ul li a {
                color: white;
                text-decoration: none;
                font-size: 1.1em;
                transition: color 0.3s ease;
            }
            nav ul li a:hover {
                color: black;
            }
            .main-content {
                margin-top: 80px;
                padding: 2rem 0;
            }
            .content {
                background: #161616;
                padding: 2rem;
                opacity: 0;
                transform: translateY(20px);
                animation: fadeInUp 0.8s forwards;
            }
            @keyframes fadeInUp {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .subject-list {
                list-style-type: none;
                padding: 0;
            }
            .subject-item {
                background: black;
                color: white;
                padding: 15px 20px;
                margin: 10px 0;
                text-decoration: none;
                display: block;
                transition: all 0.3s ease;
                opacity: 0;
                transform: translateY(20px);
            }
            .subject-item:nth-child(1) { animation: fadeInUp 0.8s 0.2s forwards; }
            .subject-item:nth-child(2) { animation: fadeInUp 0.8s 0.4s forwards; }
            .subject-item:nth-child(3) { animation: fadeInUp 0.8s 0.6s forwards; }
            .subject-item:nth-child(4) { animation: fadeInUp 0.8s 0.8s forwards; }
            .subject-item:nth-child(5) { animation: fadeInUp 0.8s 1s forwards; }
            .subject-item:hover {
                background: white;
                color: #161616;
                transform: translateY(-5px);
            }
            .back-link {
                display: inline-block;
                margin-top: 20px;
                color: white;
                text-decoration: none;
                font-weight: bold;
                transition: color 0.3s ease;
                opacity: 0;
                animation: fadeInUp 0.8s 1.2s forwards;
            }
            .back-link:hover {
                color: black;
            }
            .resource-buttons {
                display: flex;
                justify-content: center;
                gap: 20px;
                margin-top: 20px;
            }
            .resource-button {
                background: white;
                color: #161616;
                padding: 10px 20px;
                border: none;
                text-decoration: none;
                font-size: 1em;
                font-weight: bold;
                text-transform: uppercase;
                transition: all 0.3s ease;
                cursor: pointer;
            }
            .resource-button:hover {
                background: black;
                color: white;
                transform: translateY(-5px);
            }
        </style>
    </head>
    <body>
        <header>
            <div class="container">
                <a href="index.html" class="logo">STUELP</a>
                <nav>
                    <ul>
                        <li><a href="index.html#home">Home</a></li>
                        <li><a href="index.html#resources">Resources</a></li>
                        <li><a href="index.html#about">About</a></li>
                    </ul>
                </nav>
            </div>
        </header>

        <div class="main-content">
            <div class="container">
                <div class="content">
                    <h2>Subjects</h2>
                    <ul id="subjectList" class="subject-list">
                        <!-- Subjects will be dynamically populated here -->
                    </ul>
                    <div class="resohurce-buttons">
                        <button id="notesBtn" class="resohurce-button"></button>
                        <button id="videosBtn" class="resohurce-button"></button>
                    </div>
                    <a href="index.html" class="back-link">← Back to Home</a>
                </div>
            </div>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', (event) => {
                const header = document.querySelector('header');
                window.addEventListener('scroll', () => {
                    if (window.scrollY > 50) {
                        header.style.background = 'black';
                    } else {
                        header.style.background = '#161616';
                    }
                });

                // Get year and branch from URL parameters
                const urlParams = new URLSearchParams(window.location.search);
                const year = urlParams.get('year');
                const branch = urlParams.get('branch');

                // Define subjects for each year and branch
                const subjects = {
                    '1': {
                        'common': ['Mathematics I', 'Physics', 'Chemistry', 'BPC', 'Electrical','Electronics','HST','Communication Skills','Enviornmental Science','UHVPE','Civil']
                    },
                    '2': {
                        'cs': ['Mathematics III', 'Data Structures', 'Computer Organization', 'Discrete Mathematics', 'Object-Oriented Programming'],
                        'ee': ['Mathematics II', 'Electromagnetic Theory', 'Analog Electronics', 'Signals and Systems', 'Control Systems'],
                        'me': ['Mathematics II', 'Thermodynamics', 'Fluid Mechanics', 'Material Science', 'Manufacturing Processes']
                    },
                    '3': {
                        'cs': ['Operating Systems', 'Database Management Systems', 'Computer Networks', 'Theory of Computation', 'Software Engineering'],
                        'ee': ['Power Systems', 'Digital Signal Processing', 'Microprocessors', 'Communication Systems', 'Power Electronics'],
                        'me': ['Heat Transfer', 'Machine Design', 'Industrial Engineering', 'Mechatronics', 'Vibrations']
                    },
                    '4': {
                        'cs': ['Artificial Intelligence', 'Compiler Design', 'Computer Graphics', 'Distributed Systems', 'Cryptography and Network Security'],
                        'ee': ['VLSI Design', 'Embedded Systems', 'Renewable Energy Systems', 'Digital Image Processing', 'Robotics'],
                        'me': ['CAD/CAM', 'Finite Element Analysis', 'Robotics', 'Operations Research', 'Automotive Engineering']
                    }
                };

                document.getElementById('notesBtn').addEventListener('click', () => {
        window.location.href = `notes.html?year=${year}&branch=${branch}&subject=${selectedSubject}`;
    });

    document.getElementById('videosBtn').addEventListener('click', () => {
        window.location.href = `videos.html?year=${year}&branch=${branch}&subject=${selectedSubject}`;
    });

                // Populate subject list
                const subjectList = document.getElementById('subjectList');
                if (year && branch && subjects[year] && subjects[year][branch]) {
                    subjects[year][branch].forEach(subject => {
                        const li = document.createElement('li');
                        const a = document.createElement('a');
                        a.href = '#';
                        a.className = 'subject-item';
                        a.textContent = subject;
                        li.appendChild(a);
                        subjectList.appendChild(li);
                    });
                } else {
                    subjectList.innerHTML = '<li>No subjects found for the selected year and branch.</li>';
                }
            });
        </script>
    </body>
    </html>
