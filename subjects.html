<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STUELP - Subjects</title>
  <link href="https://fonts.googleapis.com/css?family=Muli:400,700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Muli', sans-serif;
      line-height: 1.6;
      color: white;
      background-color: white;
    }
    .container {
      width: 80%;
      margin: auto;
      overflow: hidden;
      padding: 20px;
    }
    header {
      background: #161616;
      color: black;
      padding: 1rem 0;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
      transition: all 0.3s ease;
    }
    header .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 1.8em;
      letter-spacing: 0.2em;
      font-weight: 700;
      text-decoration: none;
      color: white;
      transition: all 0.3s ease;
    }
    .logo:hover {
      color: black;
    }
    nav ul {
      display: flex;
      list-style: none;
    }
    nav ul li {
      margin-left: 20px;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      font-size: 1.1em;
      transition: color 0.3s ease;
    }
    nav ul li a:hover {
      color: black;
    }
    .main-content {
      margin-top: 80px;
      padding: 2rem 0;
    }
    .content {
      background: #161616;
      padding: 2rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s forwards;
    }
    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .subject-list {
      list-style-type: none;
      padding: 0;
    }
    .subject-item {
      background: black;
      color: white;
      padding: 15px 20px;
      margin: 10px 0;
      text-align-last: center;
      text-decoration: none;
      display: block;
      transition: all 0.3s ease;
      opacity: 0;
      transform: translateY(10px);
    }
.subject-item {
  animation: fadeInUp 1.0s forwards;
}
    .subject-item:hover {
      background: #1F1F1F;
      color: #161616;
      transform: translateY(-10px);
    }
    .subject-item a {
      color: white;
      text-decoration: none;
    }
      .subject-item a: hover {
      color: black;
      text-decoration: none;
    }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: black;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s ease;
      opacity: 0;
      animation: fadeInUp 0.2s 0.3s forwards;
    }

  </style>
</head>
<body>
  <header>
    <div class="container">
      <a href="NewIndex.html" class="logo">STUELP</a>
      <nav>
        <ul>
          <li><a href="NewIndex.html#home">Home</a></li>
          <li><a href="NewIndex.html#resources">Resources</a></li>
          <li><a href="NewIndex.html#about">About</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <div class="main-content">
    <div class="container">
      <h2>Subjects</h2>
      <ul id="subjectList" class="subject-list"></ul>
      <a href="NewIndex.html" class="back-link">&larr; Back to Home</a>
    </div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const year = urlParams.get('year');
      const branch = urlParams.get('branch');

      const subjects = {
        '2': {
          'cs': [
            'Syllabus',
            'Question Papers',
            'Statistical Analysis',
            'Operating System',
            'Advanced Java Programming',
            'Database Management System',
            'Theory Of Computation',
            'Microprocessor'
          ]
        }
      };
      
      const driveLinks = {
        'Syllabus': 'https://drive.google.com/drive/u/1/folders/1W6X_84A2od6EF3Fcik5GAuFD3VTCXRze',
        'Question Papers': 'https://drive.google.com/drive/u/1/folders/1IpcC0WUx7jsf26egzejRqKMYEZVr3yfb',
        'Statistical Analysis': 'https://drive.google.com/drive/u/1/folders/1PY1fnLhaAUDmyppsuiTNESCpCTsxwmhI',
        'Operating System': 'https://drive.google.com/drive/u/1/folders/1-hn7KSs77cHR2jkS_qdDpw_gPabGDOBs',
        'Advanced Java Programming': 'https://drive.google.com/drive/u/1/folders/1oYSCudoV_XYyFDBgzf_eO_iQnZc9t0hH',
        'Database Management System': 'https://drive.google.com/drive/u/1/folders/1RyY5tGf5p53RVwQd7P4AQe-wNfMEF5pK',
        'Theory Of Computation': 'https://drive.google.com/drive/u/1/folders/1gTW1mUJv4I3rjNFWhGuBBIWIqifVCCRn',
        'Microprocessor': 'https://drive.google.com/drive/u/1/folders/1WxG0waaTmwp7ztkJ32QvqbKxtqYhZh4i'
      };

const subjectList = document.getElementById('subjectList');

      if (subjects[year] && subjects[year][branch]) {
        subjects[year][branch].forEach(subject => {
          const li = document.createElement('li');
          li.classList.add('subject-item');
          
          const a = document.createElement('a');
          a.href = driveLinks[subject];
          a.textContent = subject;
          a.target = '_blank';  // This ensures the link opens in a new tab
          a.onclick = function(event) {
            window.open(a.href, '_blank');
            event.preventDefault(); // Prevent the default link behavior
          };
          li.appendChild(a);
          
          subjectList.appendChild(li);
        });
      } else {
        subjectList.innerHTML = '<li class="subject-item">No subjects found for the selected year and branch.</li>';
      }
    });
  </script>
</body>
</html>
